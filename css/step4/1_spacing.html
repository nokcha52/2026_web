<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css spacing</title>
    <link rel="stylesheet" href="css/1_spacing.css">
</head>
<body>
    <div class="firstDiv">
        첫번째 Div
        <p>
            첫번째 Div 안에 P
        </p>
    </div>
    <div class="secondDiv">
        두번째 Div 
        <p>
            두번째 div 내 p
        </p>
    </div>
    <div class="centerDiv">
        중앙에 위치하는 Div 
        <p>
            중앙 div 내 p
        </p>
    </div>
    <div class="paddingDiv">
        padding이 적용된 div
        <p>
            padding이 적용된 div 내 p
        </p>
    </div>
</body>
</html>
